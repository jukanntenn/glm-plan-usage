# GLM Plan Usage Configuration
# This file configures the GLM plan usage plugin for Claude Code
#
# Location: ~/.claude/glm-plan-usage/config.toml
# Generate with: glm-plan-usage init
# Validate with: glm-plan-usage check
# Update with:   glm-plan-usage update
# Print current: glm-plan-usage print
#
# All fields are commented out with their default values.
# Uncomment only the fields you want to customize.

# =============================================================================
# STYLE CONFIGURATION
# =============================================================================

# [style]
# Display mode: "auto", "emoji", or "ascii"
# - auto: Auto-detect terminal capabilities (default)
# - emoji: Use emoji icons (🪙 🌐)
# - ascii: Use ASCII characters ($ #)
# mode = "auto"

# Separator between segments (supports ANSI escape codes)
# separator = " | "

# =============================================================================
# SEGMENTS CONFIGURATION
# =============================================================================
# Each segment displays a specific usage metric.
# Uncomment a [[segments]] block to customize it.
# Segments are displayed in the order they appear in this array.

# [[segments]]
# Token Usage Segment
# Shows your token quota usage with percentage and countdown to reset
# id = "token_usage"
# enabled = true

# [segments.icon]
# emoji = "🪙"
# ascii = "$"

# [segments.options]
# Show timer (clock or countdown) to quota reset
# show_timer = true
# Timer display mode: "clock" or "countdown"
# timer_mode = "clock"
# Show model consumption multiplier for premium models
# show_multiplier = true

# [[segments]]
# Weekly Token Usage Segment
# Shows your weekly token quota usage with percentage
# id = "weekly_usage"
# enabled = true

# [segments.icon]
# emoji = "🗓️"
# ascii = "*"

# [segments.options]

# [[segments]]
# MCP Usage Segment
# Shows your MCP (Model Context Protocol) tool usage quota
# id = "mcp_usage"
# enabled = true

# [segments.icon]
# emoji = "🌐"
# ascii = "#"

# [segments.options]

# =============================================================================
# DYNAMIC COLORING
# =============================================================================
# Colors are applied per segment part:
# - Primary (percentage) + icon: dynamic based on usage
#   - Green (0-80%): Normal usage
#   - Yellow (81-90%): Warning zone
#   - Red (91-100%): Critical usage
# - Internal separator (·): white
# - Secondary (timer/clock): gray
# - Multiplier (e.g., 3x): red (only shown when > 1x)
#
# This behavior is automatic and cannot be customized.

# =============================================================================
# API CONFIGURATION
# =============================================================================

# [api]
# Request timeout in milliseconds
# timeout_ms = 5000
# Number of retry attempts for failed API requests
# retry_attempts = 2

# =============================================================================
# MULTIPLIER CONFIGURATION
# =============================================================================

# [multiplier]
# Model ID substrings that identify premium models (case-insensitive)
# premium_models = ["glm-5", "glm-5.1", "glm-5-turbo"]
# Peak hours in UTC+8 (closed interval: both endpoints inclusive)
# peak_start = "14:00"
# peak_end = "18:00"
# Multiplier values
# peak = 3.0
# off_peak = 2.0

# [multiplier.promo]
# Promotional off-peak rate (overrides off_peak when promo is active)
# off_peak = 1.0
# Promo expiry date (inclusive)
# expires = "2026-06-30"

# =============================================================================
# CACHE CONFIGURATION
# =============================================================================

# [cache]
# Enable or disable caching
# enabled = true
# Time-to-live for cached data in seconds
# ttl_seconds = 300

# =============================================================================
# ENVIRONMENT VARIABLES
# =============================================================================
# The plugin requires these environment variables to be set:
#
# ANTHROPIC_AUTH_TOKEN - Your API authentication token
# ANTHROPIC_BASE_URL - API base URL (platform-specific)
#
# For ZHIPU AI (智谱):
#   ANTHROPIC_BASE_URL="https://open.bigmodel.cn/api/anthropic"
#
# For ZAI:
#   ANTHROPIC_BASE_URL="https://api.z.ai/api/paas/v4/"
